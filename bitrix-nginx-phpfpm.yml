---
# Bitrix-oriented nginx + php-fpm stack for EL9 (Oracle Linux 9).
# This only installs nginx/php/extensions and configures php-fpm socket for nginx.
# Bitrix application install/config is out of scope here.
- hosts: bitrix-hosts
  become: true
  vars:
    standalone_web_create_demo: false
    standalone_use_bitrix_repo: true
    standalone_nginx_package: bx-nginx
    standalone_web_extra_packages:
      - msmtp
    standalone_php_packages:
      - php-fpm
      - php-cli
      - php-mysqlnd
      - php-gd
      - php-mbstring
      - php-xml
      - php-intl
      - php-soap
      - php-zip
      - php-bcmath
      - php-opcache
      - php-process
      - php-json
      - php-curl
      - php-ldap
      # Optional but common for Bitrix images/PDF:
      - php-pecl-imagick
      # Optional caching/session integrations:
      - php-pecl-redis5
    standalone_phpfpm_pool_ini:
      error_reporting: "E_ALL & ~E_NOTICE & ~E_WARNING"
      enable_dl: "Off"
      short_open_tag: "On"
      allow_url_fopen: "On"
      max_input_vars: "10000"
      max_file_uploads: "100"
      max_execution_time: "300"
      max_input_time: "60"
      output_buffering: "4096"
      request_order: "GP"
      variables_order: "GPCS"
      post_max_size: "1024M"
      upload_max_filesize: "1024M"
      pcre.backtrack_limit: "1000000"
      pcre.recursion_limit: "14000"
      realpath_cache_size: "4096k"
      mysql.default_socket: "/var/lib/mysqld/mysqld.sock"
      mysqli.default_socket: "/var/lib/mysqld/mysqld.sock"
      default_charset: "UTF-8"
      sendmail_path: "msmtp -t -i"
      memory_limit: "512M"
      mail.add_x_header: "Off"
      expose_php: "Off"
      display_errors: "Off"
      session.name: "BITRIX_PHPSESSID"
      session.cookie_samesite: "\"Lax\""
  roles:
    - standalone-web


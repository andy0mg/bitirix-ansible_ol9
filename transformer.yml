---
- hosts:
    - bitrix-hosts
  vars:
    ansible_playbook_file: NOT_DEFINED
    ansible_playbook_debug: NOT_DEFINED
    # Standalone-friendly defaults
    is_create: true
    is_remove: false
    transformer_standalone: true
    transformer_host: "{{ inventory_hostname }}"
  roles:
    - transformer

- hosts: bitrix-hosts
  vars:
    cache_directory: /opt/webdir/tmp
  roles:
    - cleaner

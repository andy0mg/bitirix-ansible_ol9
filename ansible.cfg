[defaults]
#
# Portable defaults: keep everything inside this repo.
# Override per-environment with:
# - ANSIBLE_CONFIG=/path/to/this/ansible.cfg
# - ansible-playbook -i inventory/hosts ...
#
inventory = inventory/hosts
roles_path = roles
collections_path = ./.ansible/collections
#
# Don't hardcode python path; let Ansible discover it.
# interpreter_python = /usr/bin/python3.11
[privilege_escalation]
[persistent_connection]
[connection]
[colors]
[selinux]
[diff]
#always = True
[galaxy]
[inventory]
[netconf_connection]
[paramiko_connection]
[jinja2]
[tags]

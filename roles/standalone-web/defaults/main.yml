---
# Minimal nginx + php-fpm stack for EL9 (Oracle Linux 9, Rocky/Alma/CentOS Stream 9)

standalone_web_root: /var/www/html
standalone_web_server_name: _

# If true, creates a demo PHP file at {{ standalone_web_root }}/index.php
standalone_web_create_demo: true

# php-fpm pool settings (www)
standalone_phpfpm_user: nginx
standalone_phpfpm_group: nginx

# nginx listen port
standalone_nginx_listen: 80

# nginx package to install (set to bx-nginx for Bitrix repo)
standalone_nginx_package: nginx

# Bitrix repository (repo.bitrix.info) for EL9 packages like bx-nginx.
standalone_use_bitrix_repo: false
beta_version: disable
standalone_bitrix_repo_gpgcheck: false
standalone_bitrix_repo_sslverify: true

# Extra PHP packages (extensions) to install alongside php-fpm.
# Override from playbooks for a Bitrix-ready set.
standalone_php_packages:
  - php-fpm
  - php-cli

# Extra non-PHP packages (e.g. msmtp for sendmail_path)
standalone_web_extra_packages: []

# Optional: php.ini-like directives applied on php-fpm pool (www) level
# via php_admin_value/php_value in /etc/php-fpm.d/www.conf.
standalone_phpfpm_pool_ini: {}

